    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    }
    .tool-canvas-area {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    canvas { display: block; background: transparent; }

  
    #audioStartOverlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.94);
    }

    #audioStartButton {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 18px 28px;
      background: #111;
      color: #fff;
      font: 600 18px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }

    #audioPanel {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
      width: min(290px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.14);
      color: #111;
      font: 14px/1.3 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #audioPanel .controlRow + .controlRow {
      margin-top: 12px;
    }

    #audioPanel .controlHeader {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    #audioPanel input[type="range"] {
      width: 100%;
    }

    #audioStatus {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }

    #hideControlsButton {
      width: 100%;
      margin-top: 12px;
      padding: 9px 12px;
      border: 0;
      border-radius: 10px;
      background: rgba(0,0,0,0.08);
      color: #111;
      font: inherit;
    }

    #showControlsButton {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9998;
      display: none;
      padding: 10px 13px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.12);
      color: #111;
      font: 14px/1 system-ui, sans-serif;
    }

  
    #backgroundColorPicker {
      width: 100%;
      height: 40px;
      padding: 0;
      border: 0;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
    }

    #toggleSlidersButton {
      width: 100%;
      margin-top: 12px;
      padding: 9px 12px;
      border: 0;
      border-radius: 10px;
      background: rgba(0,0,0,0.08);
      color: #111;
      font: inherit;
    }

    #sliderControls.is-hidden {
      display: none;
    }

  </style>
</head>

// Deterministic random helper
function seededRandom(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

async function loadFont() {
  const font = controls.get('fontSettings');
  const size = controls.get('fontSize');
  try {
    await document.fonts.load(`${font.style} ${font.weight} ${size}px ${font.family}`);
    isFontLoaded = true;
  } catch (e) {
    console.warn("Font load failed, using fallback", e);
    isFontLoaded = true;
  }
}

function loadImage() {
  const url = controls.get('sourceImage');
  if (!url) {
    loadedImage = null;
    currentImageUrl = null;
    return;
  }
  if (url === currentImageUrl) return;

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    loadedImage = img;
    currentImageUrl = url;
  };
  img.src = url;
}

// Initial load
loadFont();
loadImage();
initManualOffsets();

controls.onChange('fontSettings', loadFont);
controls.onChange('fontSize', loadFont);
controls.onChange('sourceImage', loadImage);

// Mouse interaction: Cycle modes + Select segment
canvas.addEventListener('mousedown', (e) => {
  const pos = CanvasRuntimeAPI.getMousePos(e);
  const w = canvas.width;
  const h = canvas.height;
  const centerX = w / 2;
  const sliceCount = controls.get('sliceCount');
  const mode = controls.get('mode');
  const size = controls.get('fontSize');
  
  // Cycle target mode
  targetMode = (targetMode + 1) % 3;
  
  let startY, totalSliceAreaHeight;
  if (mode === 'text') {
    totalSliceAreaHeight = size * 1.5;
    startY = h / 2 - totalSliceAreaHeight / 2;
  } else {
    totalSliceAreaHeight = h;
    startY = 0;
  }
  
  const baseAngle = controls.get('angle');
  const angleSpread = controls.get('angleSpread');
  const angleRandomness = controls.get('angleRandomness');

  const getLineY = (idx, x) => {
    let yPos = startY + (idx / sliceCount) * totalSliceAreaHeight;
    let lineAngle = baseAngle;
    if (idx > 0 && idx < sliceCount) {
      const spreadFactor = (idx / sliceCount) - 0.5;
      lineAngle += spreadFactor * angleSpread;
      const rand = seededRandom(idx * 777);
      lineAngle += (rand - 0.5) * 2 * angleRandomness;
    }
    const rad = (lineAngle * Math.PI) / 180;
    return yPos + (x - centerX) * Math.tan(rad);
  };

  // Check which slice the mouse is in for selection
  for (let i = 0; i < sliceCount; i++) {
    const topYAtMouse = getLineY(i, pos.x);
    const bottomYAtMouse = getLineY(i + 1, pos.x);

    if (pos.y >= topYAtMouse && pos.y <= bottomYAtMouse) {
      controls.set('activeSegment', i);
      break;
    }
  }
});

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background Overlay
  const bgOpacity = controls.get('bgOverlayOpacity') / 100;
  if (bgOpacity > 0) {
    ctx.save();
    ctx.fillStyle = controls.get('bgOverlayColor');
    ctx.globalAlpha = bgOpacity;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }
  const mode = controls.get('mode');
  if (mode === 'text' && !isFontLoaded) return;
  if (mode === 'image' && !loadedImage) {
    ctx.fillStyle = '#999';
    ctx.textAlign = 'center';
    ctx.fillText('Upload an image to slice', canvas.width / 2, canvas.height / 2);
    requestAnimationFrame(draw);
    return;
  }

  const w = canvas.width;
  const h = canvas.height;
  const text = controls.get('textContent');
  const font = controls.get('fontSettings');
  const size = controls.get('fontSize');
  const color = controls.get('textColor');
  const sliceCount = controls.get('sliceCount');
  
  const baseAngle = controls.get('angle');
  const angleSpread = controls.get('angleSpread');
  const angleRandomness = controls.get('angleRandomness');
  
  let displacementX = controls.get('displacementX');
  let displacementY = controls.get('displacementY');
  let randomness = controls.get('randomness');
  const showLines = controls.get('showLines');
  const lineColor = controls.get('lineColor');
  const lineOpacity = controls.get('lineOpacity') / 100;
  const activeIdx = controls.get('activeSegment');
  const hiddenLinesStr = controls.get('hiddenLines') || "";
  const hiddenIndices = hiddenLinesStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));

  const animate = controls.get('animate');
  let animSpeed = controls.get('animationSpeed') / 1000;

  // Audio Reactivity
  const audioReactive = controls.get('audioReactive');
  const perSegment = controls.get('perSegmentAudio');
  const sensitivity = controls.get('audioSensitivity');
  const smoothing = controls.get('audioSmoothing');
  const threshold = controls.get('audioThreshold');
  const band = controls.get('audioBand');
  const freqSpread = controls.get('audioFreqSpread');
  
  let globalVolume = 0;
  if (audioReactive && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
    
    // Global Volume Calculation
    let start = 0, end = dataArray.length;
    if (band === 'Bass') { end = Math.floor(dataArray.length * 0.2); }
    else if (band === 'Mid') { start = Math.floor(dataArray.length * 0.2); end = Math.floor(dataArray.length * 0.6); }
    else if (band === 'Treble') { start = Math.floor(dataArray.length * 0.6); }
    
    let sum = 0;
    for (let i = start; i < end; i++) sum += dataArray[i];
    globalVolume = (sum / (end - start)) / 255;
    if (globalVolume < threshold) globalVolume = 0;
    else globalVolume = (globalVolume - threshold) / (1 - threshold);
  }

  smoothedVolume = lerp(smoothedVolume, globalVolume, 1 - smoothing);

  if (animate || (audioReactive && controls.get('audioTargetSpeed'))) {
    const speedBoost = audioReactive ? smoothedVolume * (sensitivity / 5) : 0;
    time += animSpeed * (1 + speedBoost);
  }

  // Smooth mode transition
  const transitionSpeed = 0.08;
  modeLerp = lerp(modeLerp, targetMode, transitionSpeed);

  const centerX = w / 2;
  const centerY = h / 2;

  let startY, totalSliceAreaHeight;
  if (mode === 'text') {
    totalSliceAreaHeight = size * 1.5;
    startY = centerY - totalSliceAreaHeight / 2;
  } else {
    totalSliceAreaHeight = h;
    startY = 0;
  }

  const sliceHeight = totalSliceAreaHeight / sliceCount;

  const lines = [];
  for (let i = 0; i <= sliceCount; i++) {
    const yPos = startY + i * sliceHeight;
    let lineAngle = baseAngle;
    if (i > 0 && i < sliceCount) {
      const spreadFactor = (i / sliceCount) - 0.5;
      lineAngle += spreadFactor * angleSpread;
      const rand = seededRandom(i * 777);
      lineAngle += (rand - 0.5) * 2 * angleRandomness;
    } else {
      lineAngle = baseAngle;
    }
    const rad = (lineAngle * Math.PI) / 180;
    lines.push({ y: yPos, tan: Math.tan(rad) });
  }

  for (let i = 0; i < sliceCount; i++) {
    const lineTop = lines[i];
    const lineBottom = lines[i+1];

    // Per-segment audio volume
    let segVol = smoothedVolume;
    if (audioReactive && perSegment && dataArray) {
      const binIdx = Math.floor((i / sliceCount) * dataArray.length * 0.5 * freqSpread);
      let rawVol = (dataArray[binIdx % dataArray.length] || 0) / 255;
      if (rawVol < threshold) rawVol = 0;
      else rawVol = (rawVol - threshold) / (1 - threshold);
      
      segmentVolumes[i] = lerp(segmentVolumes[i] || 0, rawVol, 1 - smoothing);
      segVol = segmentVolumes[i];
    }
    
    const reactFactor = segVol * (sensitivity / 10);

    // Calculate offsets for each state
    const s0x = 0, s0y = 0;
    const offsetDir = i % 2 === 0 ? 1 : -1;
    
    let dX = displacementX;
    let dY = displacementY;
    let randFactor = randomness;
    
    if (audioReactive) {
      if (controls.get('audioTargetDisplacement')) {
        dX *= (1 + reactFactor * 5);
        dY *= (1 + reactFactor * 5);
      }
      if (controls.get('audioTargetChaos')) {
        randFactor = Math.min(1, randFactor + reactFactor * 2);
      }
    }

    const s1x = offsetDir * dX;
    const s1y = offsetDir * dY;
    const rand = seededRandom(i + 1);
    const waveX = Math.sin(time + i * 0.5) * dX;
    const s2x = waveX + ((rand - 0.5) * 2 * dX * randFactor);
    const s2y = (rand - 0.5) * 2 * dY * randFactor;

    let finalOffsetX, finalOffsetY;
    if (modeLerp <= 1) {
      finalOffsetX = lerp(s0x, s1x, modeLerp);
      finalOffsetY = lerp(s0y, s1y, modeLerp);
    } else {
      finalOffsetX = lerp(s1x, s2x, modeLerp - 1);
      finalOffsetY = lerp(s1y, s2y, modeLerp - 1);
    }

    const manual = manualOffsets[i] || { x: 0, y: 0 };
    finalOffsetX += manual.x;
    finalOffsetY += manual.y;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, lineTop.y + (0 - centerX) * lineTop.tan);
    ctx.lineTo(w, lineTop.y + (w - centerX) * lineTop.tan);
    ctx.lineTo(w, lineBottom.y + (w - centerX) * lineBottom.tan);
    ctx.lineTo(0, lineBottom.y + (0 - centerX) * lineBottom.tan);
    ctx.closePath();
    ctx.clip();

    if (i === activeIdx) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
      ctx.fill();
    }

    ctx.translate(centerX + finalOffsetX, centerY + finalOffsetY);
    ctx.translate(-centerX, -centerY);

    if (mode === 'text') {
      ctx.font = `${font.style} ${font.weight} ${size}px ${font.family}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.fillText(text, centerX, centerY);
    } else if (loadedImage) {
      const scale = controls.get('imageScale');
      const imgW = w * scale;
      const imgH = h * scale;
      const imgX = (w - imgW) / 2;
      const imgY = (h - imgH) / 2;
      CanvasRuntimeAPI.drawImage(ctx, loadedImage, imgX, imgY, imgW, imgH, 'cover');
    }
    ctx.restore();

    const isHidden = hiddenIndices.includes(i);
    if (showLines && i < sliceCount && !isHidden) {
      let currentLineWidth = controls.get('lineWidth');
      if (audioReactive && controls.get('audioTargetThickness')) {
        currentLineWidth *= (1 + reactFactor * 10);
      }

      ctx.save();
      ctx.beginPath();
      ctx.strokeStyle = lineColor;
      ctx.globalAlpha = lineOpacity;
      ctx.lineWidth = (i === activeIdx - 1 || i === activeIdx) ? currentLineWidth + 1 : currentLineWidth;
      ctx.moveTo(0, lineBottom.y + (0 - centerX) * lineBottom.tan);
      ctx.lineTo(w, lineBottom.y + (w - centerX) * lineBottom.tan);
      ctx.stroke();
      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
}


const sensitivitySlider = document.getElementById('sensitivitySlider');
const smoothingSlider = document.getElementById('smoothingSlider');
const sensitivityValue = document.getElementById('sensitivityValue');
const smoothingValue = document.getElementById('smoothingValue');
const audioStartButton = document.getElementById('audioStartButton');
const audioStartOverlay = document.getElementById('audioStartOverlay');
const audioPanel = document.getElementById('audioPanel');
const hideControlsButton = document.getElementById('hideControlsButton');
const showControlsButton = document.getElementById('showControlsButton');
const sliderControls = document.getElementById('sliderControls');
const toggleSlidersButton = document.getElementById('toggleSlidersButton');
const backgroundColorPicker = document.getElementById('backgroundColorPicker');
const backgroundColorValue = document.getElementById('backgroundColorValue');
const sliceCountSlider = document.getElementById('sliceCountSlider');
const sliceCountValue = document.getElementById('sliceCountValue');
const cutAngleSlider = document.getElementById('cutAngleSlider');
const cutAngleValue = document.getElementById('cutAngleValue');
const cutDensitySlider = document.getElementById('cutDensitySlider');
const cutDensityValue = document.getElementById('cutDensityValue');

if (sensitivitySlider) {
  sensitivitySlider.value = controls.get('audioSensitivity');
  sensitivityValue.textContent = sensitivitySlider.value;

  sensitivitySlider.addEventListener('input', () => {
    const value = Number(sensitivitySlider.value);
    controls.set('audioSensitivity', value);
    sensitivityValue.textContent = String(value);
  });
}

if (smoothingSlider) {
  smoothingSlider.value = controls.get('audioSmoothing');
  smoothingValue.textContent = Number(smoothingSlider.value).toFixed(2);

  smoothingSlider.addEventListener('input', () => {
    const value = Number(smoothingSlider.value);
    controls.set('audioSmoothing', value);
    smoothingValue.textContent = value.toFixed(2);
  });
}


if (sliceCountSlider) {
  sliceCountSlider.value = controls.get('sliceCount');
  sliceCountValue.textContent = sliceCountSlider.value;

  sliceCountSlider.addEventListener('input', () => {
    const value = Math.max(2, Math.min(8, Number(sliceCountSlider.value)));
    controls.set('sliceCount', value);
    sliceCountValue.textContent = String(value);
    initManualOffsets();
  });
}


if (cutAngleSlider) {
  cutAngleSlider.value = controls.get('angle');
  cutAngleValue.textContent = cutAngleSlider.value + '°';

  cutAngleSlider.addEventListener('input', () => {
    const value = Number(cutAngleSlider.value);
    controls.set('angle', value);
    cutAngleValue.textContent = value + '°';
  });
}

if (cutDensitySlider) {
  cutDensitySlider.value = controls.get('angleSpread');
  cutDensityValue.textContent = cutDensitySlider.value;

  cutDensitySlider.addEventListener('input', () => {
    const value = Number(cutDensitySlider.value);
    controls.set('angleSpread', value);
    cutDensityValue.textContent = String(value);
  });
}

if (audioStartButton) {
  audioStartButton.addEventListener('click', async () => {
    audioStartButton.disabled = true;
    audioStartButton.textContent = 'מפעיל…';

    const started = await startAudio();

    if (started) {
      audioStartOverlay.style.display = 'none';
    } else {
      audioStartButton.disabled = false;
      audioStartButton.textContent = 'נסה שוב';
    }
  });
}


if (backgroundColorPicker) {
  const initialBackground = '#ffffff';
  document.documentElement.style.background = initialBackground;
  document.body.style.background = initialBackground;
  backgroundColorValue.textContent = initialBackground;

  backgroundColorPicker.addEventListener('input', () => {
    const color = backgroundColorPicker.value;
    document.documentElement.style.background = color;
    document.body.style.background = color;
    backgroundColorValue.textContent = color;
  });
}

if (toggleSlidersButton) {
  toggleSlidersButton.addEventListener('click', () => {
    const hidden = sliderControls.classList.toggle('is-hidden');
    toggleSlidersButton.textContent = hidden ? 'הצגת סליידרים' : 'הסתרת סליידרים';
  });
}

if (hideControlsButton) {
  hideControlsButton.addEventListener('click', () => {
    audioPanel.style.display = 'none';
    showControlsButton.style.display = 'block';
  });
}

if (showControlsButton) {
  showControlsButton.addEventListener('click', () => {
    audioPanel.style.display = 'block';
    showControlsButton.style.display = 'none';
  });
}

requestAnimationFrame(draw);

    }

    
  </script>
